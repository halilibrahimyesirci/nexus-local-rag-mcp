name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Cache the embedding model so it is downloaded only on the first run.
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: .transformers-cache
          key: transformers-${{ runner.os }}-all-MiniLM-L6-v2

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
